name: DeBank CI/CD Pipeline (Yarn)

on:
  push:
    branches: ["master", "staging", "develop"]
  pull_request:
    branches: ["master", "staging", "develop"]

# Cancel older runs for the same branch
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # JOB 1: Code Quality Checks
  # ==========================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Yarn install with frozen lockfile for CI consistency
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # ------------------------------------------
      # TypeScript full-repo check (Safety)
      # ------------------------------------------
      # Even with Husky pre-commit, this ensures PRs from forks or web editor commits are safe
      - name: TypeScript Check
        run: yarn tsc --noEmit

      # ------------------------------------------
      # ESLint & Prettier (Essential)
      # ------------------------------------------
      - name: ESLint
        run: yarn lint

      - name: Prettier Check
        run: yarn format:check

  # ==========================================
  # JOB 2: Unit Tests with Coverage
  # ==========================================
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Run Vitest full suite with coverage (recommended for production)
      - name: Run Vitest Tests
        run: yarn test:ci

      # Upload coverage report for artifacts or dashboards
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  # ==========================================
  # JOB 3: Build Application
  # ==========================================
  build:
    name: Build App
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # Build the full app (Vite + TS)
      - name: Build Application
        run: yarn build

      # Upload build artifact for deploy
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist/
          retention-days: 7

  # ==========================================
  # JOB 4: Deploy (Modular Placeholder)
  # ==========================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main branch pushes
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      # Download build artifact from previous job
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist

      # Modular deploy placeholder for any platform
      - name: Deployment Placeholder
        run: |
          echo "🚀 Ready for Deployment!"
          echo "Built files are in ./dist"
          echo "Future: Add steps here for Netlify / Vercel / AWS S3 / Docker / etc."
          ls -la dist
